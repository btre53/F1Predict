services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: f1predict
      POSTGRES_PASSWORD: ***REMOVED***
      POSTGRES_DB: f1predict
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/app/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U f1predict"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    # .env overrides (CORS origin, F1P_REFRESH_ENABLED, etc.); see .env.example.
    env_file:
      - .env
    environment:
      F1P_DATABASE_URL: postgresql+psycopg://f1predict:***REMOVED***@db:5432/f1predict
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: ./frontend
    expose:
      - "80"
    depends_on:
      - api
    restart: unless-stopped

  # Public entrypoint: TLS termination + reverse proxy (auto-HTTPS when DOMAIN is a real host).
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    # DOMAIN unset -> ":80" (plain HTTP, local); set to a real host for automatic HTTPS.
    environment:
      - DOMAIN=${DOMAIN:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
