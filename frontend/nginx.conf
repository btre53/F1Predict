# Serves the built Vite SPA and proxies /api -> the API container.
# The frontend uses a relative "/api" base, so no build-time API URL is needed.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API reverse proxy (keeps the /api prefix; the FastAPI router is mounted at /api).
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Long-cache hashed assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — every other route serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
